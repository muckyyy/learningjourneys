# Fail2Ban filter for bad bots and common exploit attempts
# Catches directory traversal, PHP shell uploads, common CMS exploits

[Definition]
failregex = ^<HOST> -.*"(GET|HEAD|POST) .*/\.\.(/|%%2[fF]).*" \d+
            ^<HOST> -.*"(GET|HEAD|POST) .*/etc/passwd.*" \d+
            ^<HOST> -.*"(GET|HEAD|POST) .*/proc/self/environ.*" \d+
            ^<HOST> -.*"(GET|HEAD|POST) .*\.(cgi|asp|aspx|jsp)\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /cgi-bin/.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /admin/.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /manager/.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /phpmyadmin.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /myadmin.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /mysql.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /pma/.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /sql/.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /dbadmin.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /solr/.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /actuator.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /console/.*" (403|404)
ignoreregex =
