# Fail2Ban filter for sensitive file scanning bots
# Matches requests for .env, .git, composer.json, Dockerfile, etc.

[Definition]
failregex = ^<HOST> -.*"(GET|HEAD|POST) /\.env\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /\.git\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /\.docker\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /\.circleci\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /\.github\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /\.gitlab\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /composer\.(json|lock)\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /package(-lock)?\.json\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /Dockerfile\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /docker-compose\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /webpack\.mix\.js\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /phpunit\.xml\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /phpinfo\.php\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /wp-login\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /wp-admin\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /xmlrpc\.php\b.*" (403|404)
            ^<HOST> -.*"(GET|HEAD|POST) /\.well-known/security\.txt\b.*" (403|404)
ignoreregex =
