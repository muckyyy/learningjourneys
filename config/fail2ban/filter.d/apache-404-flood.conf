# Fail2Ban filter for excessive 404 floods (reconnaissance / fuzzing)
# Bans IPs generating too many 404 responses in a short window

[Definition]
failregex = ^<HOST> -.*"(GET|HEAD|POST) .*" 404
ignoreregex = ^<HOST> -.*"(GET|HEAD) /favicon\.ico\b.*" 404
              ^<HOST> -.*"(GET|HEAD) /robots\.txt\b.*" 404
