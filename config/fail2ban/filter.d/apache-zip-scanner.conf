# Fail2Ban filter for ZIP file scanning bots
# Matches requests ending in .zip that return 403 or 404
#
# Catches patterns like:
#   GET /backup.zip HTTP/1.1" 403
#   GET /.env.zip HTTP/1.1" 404
#   GET /composer.json.zip HTTP/1.1" 403

[Definition]
failregex = ^<HOST> -.*"(GET|HEAD|POST) .*\.zip\s+HTTP.*" (403|404)
ignoreregex =
