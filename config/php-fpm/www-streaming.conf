; =============================================================================
; PHP-FPM Pool: www-streaming
; =============================================================================
; Dedicated pool for long-running streaming requests (OpenAI Realtime API).
; Separated from the default www pool so that streaming requests cannot
; exhaust all PHP-FPM workers and block normal page loads.
;
; On a 1 GB (t3.micro) instance each worker uses ~30-45 MB resident.
; We hard-cap at 3 children so worst-case is ~135 MB for this pool.
; =============================================================================

[www-streaming]
user = apache
group = apache
listen = 127.0.0.1:9001

; --- Process Manager ---
; "ondemand" is ideal for bursty, long-running work on small instances.
; Workers are forked only when a request arrives and reaped after idle timeout.
pm = ondemand
pm.max_children = 3
pm.process_idle_timeout = 30s
pm.max_requests = 50

; --- Timeouts ---
; Kill any single request that runs longer than 3 minutes.
; This is the safety net that prevents zombie workers.
request_terminate_timeout = 180s

; --- PHP overrides for streaming ---
php_admin_value[memory_limit] = 64M
php_admin_value[max_execution_time] = 180
php_admin_value[output_buffering] = Off
php_admin_value[zlib.output_compression] = Off
php_admin_value[implicit_flush] = 1

; --- Logging ---
slowlog = /var/log/php-fpm/www-streaming-slow.log
request_slowlog_timeout = 60s
access.log = /var/log/php-fpm/www-streaming-access.log
