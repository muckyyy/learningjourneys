; =============================================================================
; PHP-FPM Pool: www (default)
; =============================================================================
; Handles all normal web requests (page loads, AJAX, form submits).
; Tuned for a 1 GB (t3.micro) EC2 instance.
;
; Each worker uses ~7 MB idle / ~20-30 MB active.
; With max_children=8 worst-case is ~240 MB for this pool.
; =============================================================================

[www]
user = apache
group = apache
listen = 127.0.0.1:9000

; --- Process Manager ---
; "ondemand" keeps idle memory low on small instances.
pm = ondemand
pm.max_children = 8
pm.process_idle_timeout = 10s
pm.max_requests = 500

; --- Timeouts ---
; Normal requests should complete in well under 60 seconds.
request_terminate_timeout = 60s

; --- PHP overrides ---
php_admin_value[memory_limit] = 128M
php_admin_value[max_execution_time] = 60

; --- Logging ---
slowlog = /var/log/php-fpm/www-slow.log
request_slowlog_timeout = 10s
